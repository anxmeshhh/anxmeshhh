name: generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%236366F1&color_dots=%23161B22,%2330363D,%236366F1,%238B5CF6,%2322D3EE
            dist/github-contribution-grid-snake-dark.svg?color_snake=%236366F1&color_dots=%230A0E1A,%2330363D,%236366F1,%238B5CF6,%2322D3EE

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
