<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="35%" stop-color="#8B5CF6"/>
      <stop offset="70%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glowIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurLg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="1" y="1" width="1198" height="278" rx="26"/>
    </clipPath>
    <style>
      .kicker{ font: 600 15px 'Segoe UI', -apple-system, Helvetica, Arial, sans-serif; letter-spacing: 4px; fill: #67E8F9; }
      .name{ font: 700 62px 'Segoe UI', -apple-system, Helvetica, Arial, sans-serif; fill: #F4F4F8; letter-spacing: -1px; }
      .tagline{ font: 400 22px 'Segoe UI', -apple-system, Helvetica, Arial, sans-serif; fill: #C7D2FE; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="278" rx="26" fill="#0A0E1A" stroke="url(#frame)" stroke-opacity="0.55"/>

  <g clip-path="url(#frameClip)">
    <circle cx="150" cy="60" r="180" fill="url(#glowIndigo)" filter="url(#blurLg)">
      <animate attributeName="opacity" values="0.75;1;0.75" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="230" r="200" fill="url(#glowViolet)" filter="url(#blurLg)">
      <animate attributeName="opacity" values="1;0.7;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="40" r="160" fill="url(#glowCyan)" filter="url(#blurLg)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="64" y="82" class="kicker">SOFTWARE ENGINEER · AI/ML · FULL-STACK · SYSTEMS</text>
  <rect x="64" y="98" width="130" height="3" rx="1.5" fill="url(#rule)"/>

  <text x="62" y="176" class="name">Animesh Gupta</text>
  <text x="64" y="216" class="tagline">Building products that deserve to exist.</text>
</svg>
